schema_version: 1

context:
  name: snowflake-sqlalchemy
  version: "1.10.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/snowflake_sqlalchemy-${{ version }}.tar.gz
  sha256: 70d0caf62ed429e080103211bfa7f221414d7ed7a08caa4c455538159e9b4520

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - snowflake-connector-python <5.0.0
    - sqlalchemy >=1.4.19

tests:
  - python:
      imports:
        - snowflake.sqlalchemy
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: Apache-2.0
  license_file: LICENSE.txt
  summary: Snowflake SQLAlchemy Dialect
  homepage: https://github.com/snowflakedb/snowflake-sqlalchemy

extra:
  recipe-maintainers:
    - xhochy
    - xylar
